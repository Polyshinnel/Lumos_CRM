services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: potolok-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - composer_vendor:/var/www/vendor
      - npm_node_modules:/var/www/node_modules
    ports:
      - "8088:8000"
      - "${VITE_HOST_PORT:-55176}:55176"
    env_file:
      - .env
    command: >
      sh -lc "composer install &&
      npm install --production=false &&
      npm run build &&
      php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_URL: http://localhost:8088
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: potolok
      DB_USERNAME: potolok
      DB_PASSWORD: potolok
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: potolok-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: potolok
      MYSQL_USER: potolok
      MYSQL_PASSWORD: potolok
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: potolok-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
  composer_vendor:
  npm_node_modules:
